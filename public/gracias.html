<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gracias - Descarga</title>
  <link rel="stylesheet" href="./css/site.css" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand">
        <div class="brand__logo" aria-hidden="true">✅</div>
        <div class="brand__text">
          <strong>Estado de pago</strong>
          <span>Validando compra</span>
        </div>
      </div>
      <a class="btn btn--ghost" href="./index.html">Volver</a>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h1 id="title">Estamos verificando tu pago…</h1>
      <p id="subtitle" class="muted">Un segundo. Esto asegura que solo descargue quien pagó.</p>

      <div class="card">
        <div class="card__body">
          <div class="kv">
            <div><span class="muted">payment_id</span><strong id="pid">—</strong></div>
            <div><span class="muted">status</span><strong id="st">—</strong></div>
          </div>

          <div class="line"></div>

          <div id="actions" class="row">
            <button id="btnRetry" class="btn btn--soft" type="button">Reintentar verificación</button>
            <a id="btnDownload" class="btn btn--primary hidden" href="#" download>Descargar PDF</a>
          </div>

          <p id="msg" class="status muted"></p>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/gracias.js" type="module"></script>
</body>
</html>
